<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AI Live Personal</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <style>
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-bg: #eff6ff;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --green-border: #bbf7d0;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --purple: #7c3aed;
      --purple-bg: #f5f3ff;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; font-size: 14px; }
    button, input, textarea, select { font: inherit; }

    /* ── LOCK SCREEN ── */
    #lockScreen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
    #lockScreen.hidden { display: none; }
    .lock-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; width: 360px; text-align: center; box-shadow: var(--shadow-md); }
    .lock-icon { font-size: 48px; margin-bottom: 16px; }
    .lock-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .lock-box p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .lock-box input { width: 100%; background: var(--surface2); color: var(--text); border: 2px solid var(--border); border-radius: 10px; padding: 13px 16px; font-size: 16px; text-align: center; letter-spacing: 4px; outline: none; transition: border-color .15s; }
    .lock-box input:focus { border-color: var(--accent); }
    .lock-box input.shake { animation: shake .35s; }
    .lock-err { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 18px; font-weight: 500; }
    .lock-btn { margin-top: 16px; width: 100%; padding: 13px; border-radius: 10px; background: var(--accent); border: 0; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; transition: background .15s; }
    .lock-btn:hover { background: var(--accent-hover); }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }

    /* ── TOP BAR ── */
    #topbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; box-shadow: var(--shadow); z-index: 10; }
    #topbar h1 { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; }
    .model-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--purple-bg); color: var(--purple); border: 1px solid #ddd6fe; font-weight: 600; white-space: nowrap; }
    .status-row { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
    .s-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); background: var(--surface2); white-space: nowrap; font-weight: 500; }
    .s-pill.on { border-color: var(--green-border); color: var(--green); background: var(--green-bg); }
    .s-pill.on-blue { border-color: #bfdbfe; color: var(--accent); background: var(--accent-bg); }
    .s-pill.on-red { border-color: #fecaca; color: var(--red); background: var(--red-bg); }
  </style>
</head>
<body>
  <div id="lockScreen">
    <div class="lock-box">
      <div class="lock-icon">🔒</div>
      <h2>AI Live Personal</h2>
      <p>Podaj hasło aby kontynuować</p>
      <input type="password" id="pwdInput" placeholder="••••••••" autocomplete="off"/>
      <div class="lock-err" id="pwdErr"></div>
      <button class="lock-btn" id="pwdBtn">Wejdź</button>
    </div>
  </div>
  <script>
    const PASS='Motion2026';
    const lock=document.getElementById('lockScreen');
    const inp=document.getElementById('pwdInput');
    const err=document.getElementById('pwdErr');
    if(sessionStorage.getItem('flow_auth')==='1') lock.classList.add('hidden');
    function tryUnlock(){
      if(inp.value===PASS){ sessionStorage.setItem('flow_auth','1'); lock.classList.add('hidden'); }
      else {
        err.textContent='Błędne hasło';
        inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake');
        inp.value=''; setTimeout(()=>err.textContent='',2500);
      }
    }
    document.getElementById('pwdBtn').addEventListener('click', tryUnlock);
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  </script>
</body>
</html>
